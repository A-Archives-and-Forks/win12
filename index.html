<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Windows 12 网页版</title>
  <meta name="description" content="Windows 12 网页版是一个在线体验 Windows 12 操作系统的开源项目, 使用 HTML、CSS 和 JavaScript 模拟 Windows 12 操作系统的界面与交互。">
  <link rel="stylesheet" href="bootstrap-icons.css">
  <base target="_blank">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f5f5f7;
      --surface: #fff;
      --text: #1d1d1f;
      --text-2: #6e6e73;
      --text-3: #a1a1a6;
      --accent: #0078d4;
      --accent-hover: #005fb8;
      --border: #d2d2d7;
    }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 32px;
    }

    .hero {
      padding: 80px 0 0;
      text-align: center;
    }

    .hero-logo {
      width: 72px;
      height: 72px;
      margin-bottom: 20px;
    }

    .hero h1 {
      font-size: clamp(40px, 7vw, 68px);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.05;
    }

    .hero h1 span {
      font-weight: 300;
      color: var(--text-2);
    }

    .hero .tagline {
      font-size: 17px;
      color: var(--text-2);
      margin-top: 10px;
    }

    .hero .cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 28px;
      padding: 11px 26px;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      text-decoration: none;
      transition: background .15s;
    }

    .hero .cta:hover { background: var(--accent-hover); }
    .hero .cta:active { transform: scale(.97); }

    .hero-preview {
      margin: 40px auto 0;
      max-width: 960px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow:
        0 2px 4px rgba(0,0,0,.04),
        0 8px 24px rgba(0,0,0,.06),
        0 24px 48px rgba(0,0,0,.04);
      border: 1px solid rgba(0,0,0,.06);
    }

    .hero-preview img {
      width: 100%;
      display: block;
    }

    .stats {
      padding: 52px 0 48px;
    }

    .stats-row {
      display: flex;
      justify-content: center;
      gap: 72px;
    }

    .stat { text-align: center; }

    .stat .num {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.2;
    }

    .stat .label {
      font-size: 12px;
      color: var(--text-3);
      font-weight: 500;
      margin-top: 2px;
      letter-spacing: 0.02em;
    }
    .section-head {
      margin-bottom: 28px;
    }

    .section-head h2 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .section-head p {
      font-size: 14px;
      color: var(--text-2);
      margin-top: 4px;
    }

    .team {
      padding: 0 0 72px;
    }

    .core-team {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 20px;
      margin-bottom: 44px;
    }

    .member {
      cursor: pointer;
      transition: opacity .15s;
    }

    .member:hover { opacity: .65; }

    .member img {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      object-fit: cover;
      margin-bottom: 8px;
      display: block;
    }

    .member .name {
      font-size: 13px;
      font-weight: 600;
      display: block;
      line-height: 1.3;
    }

    .member .handle {
      font-size: 11px;
      color: var(--text-3);
      display: block;
      margin-top: 1px;
    }

    .contributors-area h3 {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-3);
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    .contributor-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .contributor-list a {
      display: block;
      transition: opacity .15s;
    }

    .contributor-list a:hover { opacity: .55; }

    .contributor-list img {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      object-fit: cover;
      display: block;
    }

    .contributor-list .more {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px dashed var(--border);
      color: var(--text-3);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: border-color .2s, color .2s;
    }

    .contributor-list .more:hover {
      border-color: var(--text-3);
      color: var(--text-2);
    }


    #footer {
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 24px 0;
    }

    #footer > div {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #footer a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-2);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: color .15s;
    }

    #footer a:hover { color: var(--text); }

    #footer a icon {
      font-size: 14px;
    }

    #footer a svg {
      width: 20px;
      height: 20px;
    }


    @media (max-width: 768px) {
      .hero { padding: 56px 0 0; }
      .hero-logo { width: 56px; height: 56px; }
      .hero .tagline { font-size: 15px; }
      .hero-preview { margin-top: 28px; border-radius: 8px; }
      .stats { padding: 36px 0 32px; }
      .stats-row { gap: 40px; }
      .stat .num { font-size: 26px; }
      .core-team { grid-template-columns: repeat(3, 1fr); gap: 16px; }
      .container { padding: 0 20px; }
      .team { padding-bottom: 56px; }
    }

    @media (max-width: 480px) {
      .core-team { grid-template-columns: repeat(2, 1fr); }
      .stats-row { gap: 28px; }
      .stat .num { font-size: 22px; }
      #footer > div { padding: 0 20px; }
    }
  </style>
</head>
